name: Go tests

on:
  pull_request:
    paths:
      - "cmd/**"
      - "go.mod"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "go.mod"
      - ".github/workflows/test.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - run: go test ./...

