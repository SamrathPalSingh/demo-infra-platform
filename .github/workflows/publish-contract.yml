name: Publish platform contract

on:
  push:
    branches: [main]
    paths:
      - "platform-invariants.md"
      - "platform-contract.json"
      - "infra/**"
      - "terraform/**"
      - "scripts/publish-contract.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Publish versioned platform contract
        env:
          REGISTRY_REPO: ${{ vars.CONTRACT_REGISTRY_REPO || format('{0}/demo-contract-registry', github.repository_owner) }}
          REGISTRY_BRANCH: ${{ vars.CONTRACT_REGISTRY_REF || 'main' }}
          REGISTRY_WRITE_TOKEN: ${{ secrets.REGISTRY_WRITE_TOKEN }}
        run: node scripts/publish-contract.mjs
