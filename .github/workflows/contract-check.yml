name: Check service contracts

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "infra/**"
      - "terraform/**"
      - "platform-invariants.md"
      - "cmd/fanout-contract-test/**"
      - "go.mod"
      - ".github/workflows/contract-check.yml"

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: infra-contract-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false

      - name: Dispatch checks to every service and aggregate their results
        id: contract
        continue-on-error: true
        env:
          REGISTRY_REPO: ${{ vars.CONTRACT_REGISTRY_REPO || format('{0}/demo-contract-registry', github.repository_owner) }}
          REGISTRY_REF: ${{ vars.CONTRACT_REGISTRY_REF || 'main' }}
          REGISTRY_TOKEN: ${{ secrets.CONTRACT_FANOUT_TOKEN }}
          FANOUT_TOKEN: ${{ secrets.CONTRACT_FANOUT_TOKEN }}
          FANOUT_TIMEOUT_SECONDS: ${{ vars.FANOUT_TIMEOUT_SECONDS || '600' }}
          FANOUT_POLL_SECONDS: ${{ vars.FANOUT_POLL_SECONDS || '10' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: go run ./cmd/fanout-contract-test

      - name: Upload machine-readable verdict
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: infra-app-contract-verdict
          path: .contract-report.json
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Enforce verdict
        if: steps.contract.outcome == 'failure'
        run: exit 1
